<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <!-- Shield background -->
  <path d="M10 8 C10 4, 14 0, 18 0 L82 0 C86 0, 90 4, 90 8 L90 52 C90 62, 80 72, 50 78 C20 72, 10 62, 10 52 Z" fill="#089247"/>
  <!-- Inner shield border -->
  <path d="M14 10 C14 7, 17 4, 20 4 L80 4 C83 4, 86 7, 86 10 L86 50 C86 59, 77 68, 50 73 C23 68, 14 59, 14 50 Z" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- RTJ Text -->
  <text x="50" y="34" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="bold" fill="white" letter-spacing="2">RTJ</text>
  <!-- Golf ball -->
  <circle cx="50" cy="50" r="6" fill="white" opacity="0.9"/>
  <circle cx="48" cy="49" r="0.7" fill="#089247" opacity="0.4"/>
  <circle cx="51" cy="48" r="0.7" fill="#089247" opacity="0.4"/>
  <circle cx="50" cy="51" r="0.7" fill="#089247" opacity="0.4"/>
  <circle cx="52" cy="50" r="0.7" fill="#089247" opacity="0.4"/>
  <circle cx="49" cy="52" r="0.7" fill="#089247" opacity="0.4"/>
  <!-- Tee line -->
  <line x1="50" y1="56" x2="50" y2="64" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <!-- Text: GOLF TRAIL -->
  <text x="150" y="30" text-anchor="middle" font-family="'Montserrat', Arial, sans-serif" font-size="13" font-weight="700" fill="#089247" letter-spacing="3">GOLF TRAIL</text>
  <!-- Text: Robert Trent Jones -->
  <text x="150" y="48" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#3d3d3d" letter-spacing="0.5">Robert Trent Jones</text>
  <!-- Decorative line -->
  <line x1="105" y1="55" x2="195" y2="55" stroke="#089247" stroke-width="1.5"/>
  <!-- Wiki subtitle -->
  <text x="150" y="68" text-anchor="middle" font-family="'Montserrat', Arial, sans-serif" font-size="10" font-weight="600" fill="#888888" letter-spacing="4">KNOWLEDGE BASE</text>
</svg>
